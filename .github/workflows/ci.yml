name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          # golangci-lint v2 — v1 is EOL and its binaries are built with an
          # older Go that can't analyze a `go 1.26` module.
          version: v2.12.2

  govulncheck:
    name: govulncheck
    # Dependency-vulnerability scan against the Go vuln DB. Cheap, fast, and
    # expected for a public security tool. Pinned version for reproducibility.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
      - name: Scan
        run: govulncheck ./...

  release-dry-run:
    name: goreleaser snapshot
    # Validates the release config (dockers_v2, nfpms, archives, cask) on every
    # PR. Catches Dockerfile/TARGETPLATFORM regressions, broken nfpms content
    # paths, and goreleaser version mismatches before tag day. GPG_KEY_PATH is
    # empty here so nfpm skips package signing (no key in CI dry-runs).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: 'v2.16.0'
          args: release --snapshot --clean --skip=sign --skip=sbom
        env:
          GPG_KEY_PATH: ''

  helm-chart-lint:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: 'v3.14.0'
      - name: helm lint
        run: helm lint charts/crond-agent
      - name: helm template (fixture values)
        run: |
          helm template ci-fixture charts/crond-agent \
            -f charts/crond-agent/examples/test-values.yaml \
            > /tmp/rendered.yaml
          test -s /tmp/rendered.yaml
          python3 -c "import yaml,sys; list(yaml.safe_load_all(open('/tmp/rendered.yaml')))"

  install-script-smoke:
    name: install.sh · shellcheck + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: shellcheck
        run: shellcheck install.sh scripts/postinstall.sh
      - name: Set up cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Install latest release via install.sh
        # Exercises the full keyless-OIDC chain end-to-end against the real
        # published release. Skips cleanly before the first release exists.
        env:
          INSTALL_DIR: ${{ runner.temp }}/crond-agent-install
        run: |
          set -euo pipefail
          mkdir -p "$INSTALL_DIR"
          if ! curl -sSfL "https://api.github.com/repos/platops-security/crond-agent/releases/latest" \
               | grep -q '"tag_name"'; then
            echo "::warning::no published release; skipping install.sh smoke test"
            exit 0
          fi
          INSTALL_REQUIRE_SIG=1 sh install.sh
          "${INSTALL_DIR}/crond-agent" version
