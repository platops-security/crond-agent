name: Nightly Build

# Publishes :nightly multi-arch Docker image + snapshot tarballs/packages on
# pushes to main and on a daily schedule. Lets users pull
# `ghcr.io/platops-security/crond-agent:nightly` for bleeding-edge testing
# without waiting for a tagged release. Nightlies are unsigned and carry no
# SBOM/provenance — only tagged releases do.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: nightly-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: 'v2.16.0'
          # --snapshot skips the tag requirement and publish step; --skip=sbom
          # + --skip=sign because syft and cosign aren't installed here (and
          # nightlies don't ship signed artifacts). GPG_KEY_PATH is empty so
          # nfpm skips package signing too. Docker images build locally.
          args: release --snapshot --clean --skip=sbom --skip=sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_PATH: ''

      - name: Re-tag and push :nightly multi-arch image
        env:
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHA=${SHORT_SHA:0:7}
          OUTDIR=dist
          BASE=ghcr.io/platops-security/crond-agent
          # goreleaser writes metadata.json as a top-level object (not an
          # array). Use .version, and fail loudly if absent.
          SNAP_TAG=$(jq -r '.version' "$OUTDIR/metadata.json")
          if [ -z "$SNAP_TAG" ] || [ "$SNAP_TAG" = "null" ]; then
            echo "::error::dist/metadata.json missing .version — goreleaser output unexpected"
            exit 1
          fi
          # Retag the goreleaser-built local images to commit-anchored names so
          # we don't leak the noisy 0.0.0-SNAPSHOT-<sha> tag into the public
          # registry. Per-arch tags are needed for buildx imagetools create.
          docker tag "${BASE}:${SNAP_TAG}-amd64" "${BASE}:nightly-${SHA}-amd64"
          docker tag "${BASE}:${SNAP_TAG}-arm64" "${BASE}:nightly-${SHA}-arm64"
          docker push "${BASE}:nightly-${SHA}-amd64"
          docker push "${BASE}:nightly-${SHA}-arm64"
          docker buildx imagetools create \
            -t "${BASE}:nightly" \
            -t "${BASE}:nightly-${SHA}" \
            "${BASE}:nightly-${SHA}-amd64" "${BASE}:nightly-${SHA}-arm64"

      - name: Upload nightly artifacts to rolling pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TAG=nightly
          OUTDIR=dist
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi
          gh release create "$TAG" \
            --prerelease \
            --title "Nightly build" \
            --notes "Rolling pre-release. Built from \`${COMMIT_SHA}\`. Not for production." \
            "$OUTDIR"/*.tar.gz \
            "$OUTDIR"/*.deb \
            "$OUTDIR"/*.rpm \
            "$OUTDIR/checksums.txt"
