name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  # cosign keyless OIDC signing.
  id-token: write
  # actions/attest-build-provenance writes the provenance attestation.
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Pre-flight tag check
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Reject misformed tags before goreleaser burns minutes building.
          # Accept v<major>.<minor>.<patch> with optional -prerelease and +build.
          if ! echo "$REF_NAME" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag '$REF_NAME' is not valid semver (expected vX.Y.Z[-pre][+build])"
            exit 1
          fi
          # Tag must be reachable from main — guards against tagging a fork or
          # stale branch. checkout with fetch-depth: 0 already pulled history.
          if ! git merge-base --is-ancestor "$REF_NAME" origin/main; then
            echo "::error::tag '$REF_NAME' is not an ancestor of origin/main"
            exit 1
          fi

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tools used by .goreleaser.yml's signs/sboms blocks.
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Import GPG key for nfpm package signing
        # Writes the signing key to a temp file and exports its path so
        # .goreleaser.yml's nfpms.{deb,rpm}.signature.key_file can template it.
        # NFPM_PASSPHRASE is read directly by nfpm at signing time.
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set — required to sign .deb/.rpm"
            exit 1
          fi
          KEY_PATH="${RUNNER_TEMP}/nfpm-signing-key.asc"
          # umask so the key file is not group/world readable.
          (umask 077; printf '%s' "$GPG_PRIVATE_KEY" > "$KEY_PATH")
          echo "GPG_KEY_PATH=${KEY_PATH}" >> "$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          # dockers_v2 (replacing the deprecated dockers + docker_manifests
          # pair) requires goreleaser v2.12+.
          version: 'v2.16.0'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT scoped to platops-security/homebrew-tap
          # Contents:write — default GITHUB_TOKEN can't push to a sibling repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Passphrase for the nfpm signing key, read by nfpm at signing time.
          NFPM_PASSPHRASE: ${{ secrets.NFPM_PASSPHRASE }}

      - name: Attest build provenance for release artifacts
        # SLSA provenance for the downloadable binaries + packages. The
        # container image is separately cosign-signed (docker_signs).
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
