name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  # cosign keyless OIDC signing.
  id-token: write
  # actions/attest-build-provenance writes the provenance attestation.
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Pre-flight tag check
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Reject misformed tags before goreleaser burns minutes building.
          # Accept v<major>.<minor>.<patch> with optional -prerelease. No +build
          # metadata: install.sh resolves only plain vX.Y.Z tags and goreleaser
          # artifact filenames don't carry build metadata, so a +build tag would
          # be unreachable by the installer — reject it at the source instead.
          if ! echo "$REF_NAME" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag '$REF_NAME' is not valid semver (expected vX.Y.Z[-pre])"
            exit 1
          fi
          # Tag must be reachable from main — guards against tagging a fork or
          # stale branch. checkout with fetch-depth: 0 already pulled history.
          if ! git merge-base --is-ancestor "$REF_NAME" origin/main; then
            echo "::error::tag '$REF_NAME' is not an ancestor of origin/main"
            exit 1
          fi

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26'

      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tools used by .goreleaser.yml's signs/sboms blocks.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Import GPG key for nfpm package signing
        # Writes the signing key to a temp file and exports its path so
        # .goreleaser.yml's nfpms.{deb,rpm}.signature.key_file can template it.
        # NFPM_PASSPHRASE is read directly by nfpm at signing time.
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is not set — required to sign .deb/.rpm"
            exit 1
          fi
          KEY_PATH="${RUNNER_TEMP}/nfpm-signing-key.asc"
          # umask so the key file is not group/world readable.
          (umask 077; printf '%s' "$GPG_PRIVATE_KEY" > "$KEY_PATH")
          echo "GPG_KEY_PATH=${KEY_PATH}" >> "$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # dockers_v2 (replacing the deprecated dockers + docker_manifests
          # pair) requires goreleaser v2.12+.
          version: 'v2.16.0'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT scoped to platops-security/homebrew-tap
          # Contents:write — default GITHUB_TOKEN can't push to a sibling repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # Passphrase for the nfpm signing key, read by nfpm at signing time.
          NFPM_PASSPHRASE: ${{ secrets.NFPM_PASSPHRASE }}

      - name: Attest build provenance for release artifacts
        # SLSA provenance for the downloadable binaries + packages. The
        # container image is separately cosign-signed (docker_signs).
        # GitHub's free attestation storage requires a public repo (or a paid
        # org plan), so skip on private repos rather than fail the release.
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
