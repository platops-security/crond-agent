apiVersion: v2
name: crond-agent
description: Wrap Kubernetes CronJobs with the crond.io monitoring agent
type: application

# Chart SemVer — independent of agent image SemVer below. Bumps when the
# chart's templates, defaults, or rendered YAML shape change.
version: 0.3.0

# appVersion tracks the agent container image tag this chart's defaults
# target. Update together with values.yaml:image.tag when bumping the
# pinned agent version.
appVersion: "0.3.0"

kubeVersion: ">=1.25.0-0"

home: https://crond.io
sources:
  - https://github.com/platops-security/crond-agent

maintainers:
  - name: crond.io team
    url: https://crond.io

keywords:
  - cron
  - monitoring
  - kubernetes
  - cronjob
  - observability

annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: MIT
