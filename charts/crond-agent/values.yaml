# Default values for crond-agent. Override with `--set` or a values file.
#
# This chart does NOT define CronJobs. It provides:
#   1. A Secret holding per-monitor ping_key UUIDs (populated from .pingKeys).
#   2. Named template macros (see templates/_wrapper.tpl) you call from
#      your own CronJob specs to inject an init container that copies the
#      agent binary into a shared emptyDir, and to rewrite the main
#      container's command so it runs through `crond-agent exec`.
#
# Two installation patterns are supported by the SAME chart:
#   - Init-container injection (default, recommended): image untouched.
#   - Pre-baked image: user image already contains /crond-agent.
#
# See examples/cronjob-init-container.yaml and examples/cronjob-prebaked.yaml.

image:
  # ghcr.io/platops-security/crond-agent is published by the
  # release-agent.yml workflow on every v* tag. Multi-arch (amd64+arm64),
  # FROM scratch (~3MB amd64, ~10MB arm64). Public, anonymously pullable.
  repository: ghcr.io/platops-security/crond-agent
  # Pinned to the version that adds the `install` subcommand needed by the
  # init-container copy pattern. Bump with appVersion in Chart.yaml.
  tag: "0.2.0"
  pullPolicy: IfNotPresent

agent:
  # Base URL of the crond.io API the wrapped commands ping. Override for
  # self-hosted / staging deployments.
  apiUrl: https://api.crond.io
  # Extra flags appended to every `crond-agent exec` invocation. Common
  # use: --timeout=10m.
  extraArgs: []
  # Whether to include captured stdout/stderr in the ping payload sent to
  # the API. Set to false for jobs whose output is privacy-sensitive. The
  # passthrough to the container's own stdout/stderr (kubectl logs) is
  # unaffected — this controls only what crosses the network.
  captureOutput: true
  # Go regexps applied to captured streams before they are sent. Matches
  # are replaced with [REDACTED]. Validated at startup. Common defaults:
  # redactPatterns:
  #   - 'Bearer [A-Za-z0-9._-]+'
  #   - 'postgres://[^@]+@[^/[:space:]]+'
  redactPatterns: []

# Map of ENV_VAR_NAME -> ping_key UUID. Each entry becomes a key in the
# generated Secret, and the wrapper macro mounts the matching value as an
# env var inside the job container. Keep names UPPER_SNAKE_CASE.
#
# Example:
#   pingKeys:
#     PING_KEY_BACKUP:  11111111-1111-1111-1111-111111111111
#     PING_KEY_REPORTS: 22222222-2222-2222-2222-222222222222
pingKeys: {}

# Pod-level security context. Applied to the whole pod spec (one entry
# per CronJob) so the wrapped user job container inherits non-root +
# seccomp defaults without each container needing to repeat them. Lets
# the chart pass Kubernetes Pod Security Standards (restricted) admission
# out of the box. Override podSecurityContext.runAsUser only if your
# wrapped image's binary refuses to run as 65532.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level hardening. Applied to the agent init container AND the
# main job container the wrapper macro creates. Kept separate from
# podSecurityContext because some fields (allowPrivilegeEscalation,
# readOnlyRootFilesystem, capabilities) are container-scoped only.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource requests/limits for the init container only — the main job
# container's resources are owned by the user's CronJob spec.
initResources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 10m
    memory: 16Mi

# Names of the emptyDir volume and its mount path inside both containers.
# Change only if you have a naming conflict with the wrapped job's own
# volumes.
sharedVolumeName: crond-agent-shared
sharedMountPath: /shared

# Internal flag. Renders templates/tests/* fixtures used for offline
# verification of the wrapper macros. NOT for production use — these
# templates are tagged with helm.sh/hook: test, so `helm install` skips
# them even when this flag is true.
tests:
  enabled: false
