{{- if .Values.injector.enabled }}
{{/*
  The injector needs NO Kubernetes API permissions — it only serves admission
  requests and never reads or writes cluster objects. So a bare ServiceAccount
  (no Role/RoleBinding) is the least-privilege identity for its pods.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "crond-agent.injector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crond-agent.labels" . | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
